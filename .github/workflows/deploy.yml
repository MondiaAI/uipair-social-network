name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      deployments: write

    env:
      # Build-time (publishable) env, used by both client and worker bundles.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ----- Frontend (Vercel-compatible client bundle) -----
      # Produces dist/client/ with a synthesized SPA index.html so any
      # static host (Vercel, Netlify, S3, etc.) can serve it.
      - name: Build React frontend (SPA client)
        run: bun run build:client

      - name: Upload client bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-bundle
          path: dist/client
          if-no-files-found: error
          retention-days: 7

      # ----- Server (Cloudflare Workers bundle) -----
      # `vite build` re-runs and emits the Worker into dist/server/.
      - name: Build Cloudflare Workers server bundle
        run: bun run build:worker

      - name: Upload worker bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle
          path: dist/server
          if-no-files-found: error
          retention-days: 7

      - name: Deploy Worker to Cloudflare
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            SUPABASE_URL
            SUPABASE_PUBLISHABLE_KEY
            SUPABASE_SERVICE_ROLE_KEY
            LOVABLE_API_KEY
            PAYMENTS_SANDBOX_WEBHOOK_SECRET
            STRIPE_SANDBOX_API_KEY
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
          PAYMENTS_SANDBOX_WEBHOOK_SECRET: ${{ secrets.PAYMENTS_SANDBOX_WEBHOOK_SECRET }}
          STRIPE_SANDBOX_API_KEY: ${{ secrets.STRIPE_SANDBOX_API_KEY }}

      # ----- Deploy SPA to Vercel (optional, only if VERCEL_TOKEN is set) -----
      # Vercel can also auto-deploy directly from GitHub using vercel.json —
      # this step is here for fully-CI-driven deploys.
      - name: Deploy SPA to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
