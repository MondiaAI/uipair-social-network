name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-client:
    name: Build SPA client (Vercel-compatible)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Publishable build-time envs. Fall back to known public Supabase project
      # values so PRs from forks (which can't read repo secrets) still build.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://nlebbmfxwztutflkxdff.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZWJibWZ4d3p0dXRmbGt4ZGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjY5MjcsImV4cCI6MjA5MzQ0MjkyN30.XEgQZQn_MTO5BCaIrnueuVod9klB7wbWZajG-5I1xGo' }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || '6fc24415-9315-4655-9213-fe093e352f40' }}
      # Optional: Flutterwave publishable key for payments UI. Empty is safe —
      # client-side payment widgets just won't initialize.
      VITE_FLUTTERWAVE_PUBLIC_KEY: ${{ secrets.VITE_FLUTTERWAVE_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build SPA (build:client)
        run: bun run build:client
      - name: Verify SPA output (index.html + shell + Vercel rewrites)
        run: node scripts/verify-spa-output.mjs
      - name: Upload SPA bundle (always — inspect on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-bundle
          path: dist/client
          if-no-files-found: warn
          retention-days: 7

  build-worker:
    name: Build Cloudflare Workers bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://nlebbmfxwztutflkxdff.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZWJibWZ4d3p0dXRmbGt4ZGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjY5MjcsImV4cCI6MjA5MzQ0MjkyN30.XEgQZQn_MTO5BCaIrnueuVod9klB7wbWZajG-5I1xGo' }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || '6fc24415-9315-4655-9213-fe093e352f40' }}
      VITE_FLUTTERWAVE_PUBLIC_KEY: ${{ secrets.VITE_FLUTTERWAVE_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Worker (build:worker)
        run: bun run build:worker
      - name: Upload Worker bundle (always — inspect on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: worker-bundle
          path: dist/server
          if-no-files-found: warn
          retention-days: 7

  smoke-test:
    name: SPA smoke test (headless Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-client
    env:
      # Smoke test consumes the prebuilt SPA bundle from build-client, so these
      # envs are mainly informational + available if the test ever needs them
      # (e.g. to call Supabase from the test harness, not from the SPA itself).
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://nlebbmfxwztutflkxdff.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5sZWJibWZ4d3p0dXRmbGt4ZGZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NjY5MjcsImV4cCI6MjA5MzQ0MjkyN30.XEgQZQn_MTO5BCaIrnueuVod9klB7wbWZajG-5I1xGo' }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || '6fc24415-9315-4655-9213-fe093e352f40' }}
      VITE_FLUTTERWAVE_PUBLIC_KEY: ${{ secrets.VITE_FLUTTERWAVE_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download SPA bundle
        uses: actions/download-artifact@v4
        with:
          name: client-bundle
          path: dist/client
      - name: Install Playwright (Chromium)
        run: bunx playwright install --with-deps chromium
      - name: Serve SPA in background
        run: |
          bunx --bun serve -s dist/client -l 5173 > /tmp/serve.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 > /dev/null && break || sleep 1
          done
          curl -sf http://localhost:5173 > /dev/null || (echo "static server failed to start" && cat /tmp/serve.log && exit 1)
      - name: Seed temporary E2E user + feed data
        id: seed
        if: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://nlebbmfxwztutflkxdff.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SEED_JSON=$(bun scripts/seed-e2e.mjs)
          echo "Seeded: $SEED_JSON"
          # Mask the password and export creds for the next step.
          E2E_EMAIL=$(echo "$SEED_JSON" | bun -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).email)}catch{}})")
          E2E_PASS=$(echo "$SEED_JSON" | bun -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).password)}catch{}})")
          echo "::add-mask::$E2E_PASS"
          echo "E2E_TEST_EMAIL=$E2E_EMAIL" >> "$GITHUB_ENV"
          echo "E2E_TEST_PASSWORD=$E2E_PASS" >> "$GITHUB_ENV"
      - name: Run smoke test
        env:
          BASE_URL: http://localhost:5173
        run: bunx playwright test e2e/smoke.spec.ts --project=chromium
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
